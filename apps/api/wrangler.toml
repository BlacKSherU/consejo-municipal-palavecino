name = "cmp-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[triggers]
crons = ["0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "cmp-db"
database_id = "820094b1-8cc1-4a23-a1cc-26eb3f928910"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cmp-assets"

[vars]
JWT_SECRET = "local-dev-jwt-secret-change-in-production"
CORS_ORIGIN = "cmp-api.tramitesgarciamiguel.workers.dev"

# Secrets (set with wrangler secret put):
# JWT_SECRET
# META_ACCESS_TOKEN — long-lived User/Page token with instagram_basic
# INSTAGRAM_USER_ID — Instagram Business Account id (numeric string)
